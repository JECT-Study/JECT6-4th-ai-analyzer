services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: blogai
      POSTGRES_PASSWORD: blogai
      POSTGRES_DB: blogai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blogai -d blogai"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 공식 마이그레이션 서비스 — 항상 Alembic으로 스키마를 초기화/업그레이드한다.
  # api/worker/crawl_worker는 이 서비스가 성공적으로 종료된 뒤에 기동된다.
  migrate:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://blogai:blogai@postgres:5432/blogai
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 1gb
      --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://blogai:blogai@postgres:5432/blogai
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # 개발용 핫리로드를 원하면 아래 주석 해제
    # volumes:
    #   - ./app:/app/app
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://blogai:blogai@postgres:5432/blogai
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    command: ["python", "-m", "app.worker.analysis_worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    # 운영에선 replicas로 수평 확장
    deploy:
      replicas: 2

  crawl_worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://blogai:blogai@postgres:5432/blogai
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    command: ["python", "-m", "app.worker.crawl_worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  pgdata:
